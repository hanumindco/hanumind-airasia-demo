<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AirAsia Ride Operations Intelligence — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#060912;font-family:"DM Sans",sans-serif;color:#F0F4FF;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.05) 1px,transparent 1px);background-size:50px 50px;animation:gridshift 40s linear infinite;z-index:0}
  @keyframes gridshift{0%{background-position:0 0}100%{background-position:50px 50px}}
  .glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,0,45,0.12),transparent 70%);top:-150px;left:50%;transform:translateX(-50%);z-index:0;pointer-events:none}
  .card{position:relative;z-index:2;width:380px;max-width:90vw;background:linear-gradient(145deg,#0D1525,#090E1A);border:1px solid rgba(0,212,255,0.18);border-radius:14px;padding:38px 34px;box-shadow:0 24px 70px rgba(0,0,0,0.55)}
  .logo{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;color:#E8002D;letter-spacing:3px;text-align:center}
  .logo span{color:#F0F4FF}
  .sub{font-size:11px;color:#00D4FF;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:6px;opacity:0.85;font-weight:600}
  .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.25),transparent);margin:26px 0}
  label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:#A8B4C8;font-weight:600;margin-bottom:7px}
  input{width:100%;padding:12px 14px;background:#060912;border:1px solid rgba(0,212,255,0.18);border-radius:8px;color:#F0F4FF;font-size:14px;font-family:"DM Sans",sans-serif;outline:none;transition:border-color 0.2s;margin-bottom:18px}
  input:focus{border-color:#E8002D}
  button{width:100%;padding:13px;background:#E8002D;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:"DM Sans",sans-serif;transition:filter 0.2s}
  button:hover{filter:brightness(1.12)}
  .error{background:rgba(232,0,45,0.1);border:1px solid rgba(232,0,45,0.3);color:#E8002D;font-size:12px;padding:9px 12px;border-radius:7px;margin-bottom:18px;text-align:center}
  .foot{font-size:10px;color:#506070;text-align:center;margin-top:22px;letter-spacing:1px}
  .pdot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00D26A;margin-right:5px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <form class="card" method="POST" action="/login{% if next and next != '/' %}?next={{ next }}{% endif %}">
    <div class="logo">AIRASIA <span>RIDE</span></div>
    <div class="sub">Operations Intelligence</div>
    <div class="divider"></div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username" autofocus required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit">Sign In</button>
    <div class="foot"><span class="pdot"></span>HANUMIND MASTER · Secure Access</div>
  </form>
</body>
</html>
